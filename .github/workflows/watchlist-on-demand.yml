name: Watchlist On-Demand

on:
  workflow_dispatch:
    inputs:
      source:
        required: false
        default: 'manual'

concurrency:
  group: watchlist-on-demand
  cancel-in-progress: true

jobs:
  send-watchlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send watchlist report
        env:
          LINE_TOKEN:   ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_watchlist_report.py
