name: Dividend Season Reminder

on:
  schedule:
    # Thai dividend seasons:
    #   Mar 1  — Q4/annual results published, ex-div dates announced (Mar–May)
    #   Aug 1  — interim results published, ex-div dates announced (Aug–Oct)
    - cron: '0 1 1 3,8 *'   # 08:00 Bangkok on Mar 1 and Aug 1

  workflow_dispatch:   # allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests -q

      - name: Send dividend season LINE reminder
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python - <<'EOF'
          import os, requests, json, datetime

          token   = os.environ["LINE_TOKEN"]
          user_id = os.environ["LINE_USER_ID"]

          month = datetime.date.today().month
          if month == 3:
              season     = "Q4/Annual"
              ex_div_window = "March – May"
              action    = "annual results season"
          else:
              season     = "Interim (H1)"
              ex_div_window = "August – October"
              action    = "interim results season"

          # Load current holdings from portfolio
          try:
              with open("set_portfolio.json") as f:
                  port = json.load(f)
              holdings = list(port.get("holdings", {}).keys())
              hold_str = ", ".join(h.replace(".BK","") for h in holdings) if holdings else "none"
          except Exception:
              hold_str = "check portfolio"

          msg = "\n".join([
              f"📅 Dividend Season Reminder — {season}",
              "─" * 32,
              f"Thai companies are entering {action}.",
              f"Ex-dividend dates typically fall: {ex_div_window}",
              "",
              f"📋 Your current holdings:",
              f"   {hold_str}",
              "",
              "✅ Action needed:",
              "1. Go to https://www.set.or.th/en/market/product/stock/dividend",
              "2. Search each holding for upcoming ex-div date",
              "3. If ex-div is within 2 weeks — hold the stock",
              "   (model will auto-guard via ex-div check,",
              "    but SET.or.th data is more accurate)",
              "",
              "⚠️  yfinance dividend data for Thai stocks",
              "is often delayed or missing. Manual check",
              "takes 5 min and ensures you don't miss income.",
          ])

          r = requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {token}",
                       "Content-Type": "application/json"},
              json={"to": user_id, "messages": [{"type": "text", "text": msg}]},
              timeout=10)
          print("LINE:", r.status_code)
          EOF
