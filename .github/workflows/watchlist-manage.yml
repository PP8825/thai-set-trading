name: Watchlist Manage

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'add or remove'
        required: true
      stock:
        description: 'Stock name or ticker'
        required: true

concurrency:
  group: watchlist-manage
  cancel-in-progress: false

permissions:
  contents: write   # needed to push watchlist changes back to repo

jobs:
  manage-watchlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Manage watchlist
        env:
          LINE_TOKEN:   ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_watchlist_manage.py "${{ github.event.inputs.action }}" "${{ github.event.inputs.stock }}"

      - name: Commit watchlist changes
        run: |
          git config user.name "SET Trading Bot"
          git config user.email "bot@set-trading.local"
          git add set_watchlist.json
          git diff --staged --quiet || git commit -m "watchlist: ${{ github.event.inputs.action }} ${{ github.event.inputs.stock }} [skip ci]"
          git push
