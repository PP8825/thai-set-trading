name: SET Realtime Monitor

on:
  schedule:
    # Every 15 min during Bangkok morning session (10:00-12:30 BKK = 03:00-05:30 UTC)
    - cron: '0,15,30,45 3,4,5 * * 1-5'
    # Every 15 min during Bangkok afternoon session (14:30-16:30 BKK = 07:30-09:30 UTC)
    - cron: '0,15,30,45 7,8,9 * * 1-5'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit portfolio state back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl -q

      - name: Run realtime monitor
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_realtime_monitor.py

      - name: Save portfolio state to repo
        run: |
          git config user.name "SET Trading Bot"
          git config user.email "bot@set-trading.local"
          git add set_portfolio.json set_signal_state.json
          git diff --staged --quiet || git commit -m "Update portfolio state [skip ci]"
          git push
