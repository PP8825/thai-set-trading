name: SET Realtime Monitor

on:
  schedule:
    # Morning session — 2 triggers (backup at 11:00 if 09:55 is skipped by GitHub)
    - cron: '55 2 * * 1-5'   # 09:55 Bangkok (primary)
    - cron: '0  4 * * 1-5'   # 11:00 Bangkok (backup)
    # Afternoon session — 2 triggers (backup at 15:30 if 14:25 is skipped by GitHub)
    - cron: '25 7 * * 1-5'   # 14:25 Bangkok (primary)
    - cron: '30 8 * * 1-5'   # 15:30 Bangkok (backup)
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run: morning or afternoon (leave blank to auto-detect)'
        required: false
        default: ''

# Cancel any queued run of the same type — prevents pile-up after timeouts
concurrency:
  group: set-trading-session
  cancel-in-progress: true

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl -q

      - name: Detect session
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Bangkok date +%H)
            MIN=$(TZ=Asia/Bangkok date +%M)
            HHMM=$((HOUR * 100 + MIN))
            if [ "$HHMM" -ge 1730 ]; then
              echo "name=closed" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -lt 14 ]; then
              echo "name=morning" >> $GITHUB_OUTPUT
            else
              echo "name=afternoon" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run session
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_session_runner.py ${{ steps.session.outputs.name }}
