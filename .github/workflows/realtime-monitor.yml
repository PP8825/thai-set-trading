name: SET Realtime Monitor

on:
  schedule:
    # Trigger at 09:55 Bangkok (02:55 UTC) — script waits internally until 10:00 market open
    - cron: '55 2 * * 1-5'
    # Trigger at 14:25 Bangkok (07:25 UTC) — script waits internally until 14:30 market open
    - cron: '25 7 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run: morning or afternoon (leave blank to auto-detect)'
        required: false
        default: ''

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl -q

      - name: Detect session
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Bangkok date +%H)
            if [ "$HOUR" -lt 14 ]; then
              echo "name=morning" >> $GITHUB_OUTPUT
            else
              echo "name=afternoon" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run session
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_session_runner.py ${{ steps.session.outputs.name }}
