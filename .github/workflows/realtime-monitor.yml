name: SET Realtime Monitor

on:
  schedule:
    # Morning session — single trigger at 09:55 Bangkok (02:55 UTC)
    - cron: '55 2 * * 1-5'   # 09:55 Bangkok
    # Afternoon session — single trigger at 14:25 Bangkok (07:25 UTC)
    - cron: '25 7 * * 1-5'   # 14:25 Bangkok
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run: morning or afternoon (leave blank to auto-detect)'
        required: false
        default: ''

# Cancel any queued run of the SAME session type — prevents pile-up.
# Uses the cron schedule string so morning and afternoon don't cancel each other.
concurrency:
  group: set-trading-${{ github.event.inputs.session || github.event.schedule || 'manual' }}
  cancel-in-progress: true

jobs:
  session:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests openpyxl -q

      - name: Detect session
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Bangkok date +%H)
            MIN=$(TZ=Asia/Bangkok date +%M)
            HHMM=$((HOUR * 100 + MIN))
            if [ "$HHMM" -ge 1730 ]; then
              echo "name=closed" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -lt 14 ]; then
              echo "name=morning" >> $GITHUB_OUTPUT
            else
              echo "name=afternoon" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run session
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_session_runner.py ${{ steps.session.outputs.name }}
