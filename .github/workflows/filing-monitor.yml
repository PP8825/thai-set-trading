name: Filing Monitor

on:
  schedule:
    # Monday 9:00 AM Bangkok (UTC+7) = 02:00 UTC — once weekly
    - cron: '0 2 * * 1'
  workflow_dispatch:   # allow manual trigger

concurrency:
  group: filing-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-filings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for new filings
        env:
          LINE_TOKEN:   ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python set_filing_monitor.py

      - name: Save filing state
        run: |
          git config user.name "SET Trading Bot"
          git config user.email "bot@set-trading.local"
          git add set_filing_state.json
          git diff --staged --quiet || git commit -m "filing-state: update seen IDs [skip ci]"
          git push
